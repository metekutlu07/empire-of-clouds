  <!-- ===============  Stylesheets =============== -->

  <link rel="stylesheet" href="./css/index.css">

<body>

  <!-- ================= Glyph Matrix Hero ================= -->
  <section class="heroGlyph hero">
    <div class="wrap">
      <div aria-label="Glyph matrix hero" class="glyphHero" id="glyphHero">
        <canvas id="gl"></canvas>
        <canvas id="c"></canvas>
        <div id="glitchOverlay" aria-hidden="true"></div>

        <div id="preludeLayer" aria-hidden="true">
          <div id="mysticLoader"></div>
          <div id="preludeStatus"></div>
          <div id="preludeTransmission"></div>
          <div id="preludeInstruction"></div>
          <div id="preludeHover"></div>

          <!-- ── Entry Selection Screen ── -->
          <div id="entryScreen" aria-hidden="true">
            <div id="entryInner">

              <div class="entryBlock" id="entryLang">
                <div class="entryLabel" data-i18n="index.langLabel">LANGUAGE</div>
                <div class="entryOptions" id="langOptions">
                  <button class="entryOption selected" data-lang="en">EN</button>
                  <button class="entryOption" data-lang="fr">FR</button>
                  <button class="entryOption" data-lang="tr">TR</button>
                  <button class="entryOption" data-lang="zh">中文</button>
                  <button class="entryOption" data-lang="ja">日本語</button>
                </div>
              </div>

              <div class="entryDivider"></div>

              <div class="entryBlock" id="entrySoundBlock">
                <div class="entryLabel" data-i18n="index.soundLabel">SOUND</div>
                <div class="entryOptions">
                  <button class="entryOption" id="entrySoundToggle" data-sound="off" aria-label="Toggle sound">
                    <svg id="iconSoundOff" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                      stroke-linejoin="round">
                      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                      <line x1="23" y1="9" x2="17" y2="15" />
                      <line x1="17" y1="9" x2="23" y2="15" />
                    </svg>
                    <svg id="iconSoundOn" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                      stroke-linejoin="round" style="display:none">
                      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    </svg>
                  </button>
                </div>
              </div>

              <button id="entryConfirm" data-i18n="index.enter">ENTER</button>

            </div>
          </div>

        </div>

        <div id="transmissionWindow" aria-live="polite">
          <div id="transmissionWarning" data-i18n="index.warning">WARNING</div>
          <div id="transmissionText"></div>
          <div id="transmissionFooter" class="desktop-footer"></div>
          <div id="transmissionFooterMobile" class="mobile-footer"></div>
        </div>

        <div id="titleGlow"></div>
        <div class="titleBlock" id="titleBlock">
          <div class="titleLine titleMain" style="--d:0ms" data-i18n="nav.brand">Empire of Clouds</div>
          <div class="titleLine titleSub" style="--d:260ms" data-i18n="index.subtitle">Codes, Colors and Cosmos</div>
          <div class="titleLine titleAuthor" style="--d:520ms">Mete Kutlu</div>
          <div class="titleButtons">
            <a class="stage" id="scrollHint" href="introduction.html" aria-label="Enter the Nebula">
              <div class="scrollContent">
                <div class="scrollText" data-i18n="index.cta1">ENTER THE NEBULA</div>
              </div>
            </a>
            <a class="stage" id="booksHint" href="books.html" aria-label="Open the Books">
              <div class="scrollContent">
                <div class="scrollText" data-i18n="index.cta2">OPEN THE BOOKS</div>
              </div>
            </a>
          </div>
        </div>

        <!-- ================= UI Overlays ================= -->
        <audio id="bgm" loop="" src="audio/index/soft_stellar_winds.mp3"></audio>
        <audio id="introAudio" src="audio/index/intro.wav"></audio>

        <button id="skipIntro" aria-label="Skip intro" data-i18n="index.skip">[ Skip ]</button>

        <div aria-label="Player instructions" class="stage" id="matrixInstructions">
          <div class="instrHeader">
            <div class="closeWrap">
              <div aria-label="Close instructions" id="closeInstructions">✕</div>
            </div>
            <div class="instrTitle" data-i18n="index.instrTitle">Interact with the matrix</div>
          </div>
          <div class="instrDivider"></div>
          <div class="instrLine" data-i18n="index.instrLeft">Left click · Virus</div>
          <div class="instrLine" data-i18n="index.instrRight">Right click · Override</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ================= Mobile instruction bar (hidden on desktop) ================= -->
  <div id="mobileInstructions" aria-hidden="true">
    <span data-i18n="index.mobileInstr1">Tap · Spyware</span>
    <span class="mobileInstrDash">—</span>
    <span data-i18n="index.mobileInstr2">Long press · Reset</span>
  </div>

  <!-- ================= SCRIPTS ================= -->

  <script src="./js/i18n.js?v=20260324b"></script>
  <script type="module" src="./js/index.js?v=20260324b"></script>

</body>

</html>
