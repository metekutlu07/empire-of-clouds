<!DOCTYPE html>
<html lang="fr">

<head>

  <!-- =============== Author and Copyright Notice =============== -->
  <meta name="author" content="Mete Kutlu">
  <meta name="copyright" content="© 2026 Mete Kutlu. Tous droits réservés.">
  <meta name="description"
    content="Empire of Clouds — Codes, Couleurs et Cosmos. Un projet artistique et architectural fondé sur la recherche, explorant la cosmologie des nuages, le calcul planétaire et les cultures visuelles le long de la Route de la Soie.">

  <!-- =============== Open Graph: Social Sharing Preview =============== -->
  <meta property="og:title" content="Empire of Clouds — Codes, Couleurs et Cosmos">
  <meta property="og:description"
    content="Un projet de recherche de Mete Kutlu explorant la cosmologie, le calcul et l'esthétique du nuage.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://empireofclouds.com">
  <meta property="og:image" content="https://empireofclouds.com/images/og-preview.jpg">
  <meta property="og:site_name" content="Empire of Clouds">
  <meta property="og:locale" content="fr_FR">

  <!-- =============== Canonical URL =============== -->
  <link rel="canonical" href="https://empireofclouds.com/fr/">

  <!-- =============== Favicon =============== -->
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">

  <!-- ===============  Structured Data SEO: for search engines =============== -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Mete Kutlu",
        "url": "https://empireofclouds.com",
        "jobTitle": "Artiste, Technologue Créatif, Chercheur et Architecte",
        "sameAs": ["https://metekutlu.com"]
      }
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accueil · Empire of Clouds</title>

  <!-- ===============  Fonts =============== -->
  <link rel="stylesheet" href="/css/fonts.css">

  <!-- ===============  Stylesheets =============== -->
  <link rel="stylesheet" href="/css/index.css">

</head>

<body>

  <!-- ================= Glyph Matrix Hero ================= -->
  <section class="heroGlyph hero">
    <div class="wrap">
      <div aria-label="Héros de la matrice de glyphes" class="glyphHero" id="glyphHero">
        <canvas id="gl"></canvas>
        <canvas id="c"></canvas>
        <div id="glitchOverlay" aria-hidden="true"></div>

        <div id="preludeLayer" aria-hidden="true">
          <div id="mysticLoader"></div>
          <div id="preludeStatus"></div>
          <div id="preludeTransmission"></div>
          <div id="preludeInstruction"></div>
          <div id="preludeHover"></div>

          <!-- ── Entry Selection Screen ── -->
          <div id="entryScreen" aria-hidden="true">
            <div id="entryInner">

              <div class="entryBlock" id="entryLang">
                <div class="entryLabel">LANGUE</div>
                <div class="entryOptions" id="langOptions">
                  <button class="entryOption" data-lang="en" onclick="window.location='/index.html'">EN</button>
                  <button class="entryOption selected" data-lang="fr">FR</button>
                  <button class="entryOption" data-lang="tr">TR</button>
                  <button class="entryOption" data-lang="zh">中文</button>
                  <button class="entryOption" data-lang="ja">日本語</button>
                </div>
              </div>

              <div class="entryDivider"></div>

              <div class="entryBlock" id="entrySoundBlock">
                <div class="entryLabel">SON</div>
                <div class="entryOptions">
                  <button class="entryOption" id="entrySoundToggle" data-sound="off" aria-label="Activer le son">
                    <svg id="iconSoundOff" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                      stroke-linejoin="round">
                      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                      <line x1="23" y1="9" x2="17" y2="15" />
                      <line x1="17" y1="9" x2="23" y2="15" />
                    </svg>
                    <svg id="iconSoundOn" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                      stroke-linejoin="round" style="display:none">
                      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    </svg>
                  </button>
                </div>
              </div>

              <button id="entryConfirm">ENTRER</button>

            </div>
          </div>

        </div>

        <div id="transmissionWindow" aria-live="polite">
          <div id="transmissionWarning">AVERTISSEMENT</div>
          <div id="transmissionText"></div>
          <div id="transmissionFooter" class="desktop-footer"></div>
          <div id="transmissionFooterMobile" class="mobile-footer"></div>
        </div>

        <div id="titleGlow"></div>
        <div class="titleBlock" id="titleBlock">
          <div class="titleLine titleMain" style="--d:0ms">Empire of Clouds</div>
          <div class="titleLine titleSub" style="--d:260ms">Codes, Couleurs et Cosmos</div>
          <div class="titleLine titleAuthor" style="--d:520ms">Mete Kutlu</div>
          <div class="titleButtons">
            <a class="stage" id="scrollHint" href="/fr/introduction.html" aria-label="Entrer dans la Nébuleuse">
              <div class="scrollContent">
                <div class="scrollText">ENTRER DANS LA NÉBULEUSE</div>
              </div>
            </a>
            <a class="stage" id="booksHint" href="/fr/books.html" aria-label="Ouvrir les Livres">
              <div class="scrollContent">
                <div class="scrollText">OUVRIR LES LIVRES</div>
              </div>
            </a>
          </div>
        </div>

        <!-- ================= UI Overlays ================= -->
        <audio id="bgm" loop="" src="/audio/index/soft_stellar_winds.mp3"></audio>
        <audio id="introAudio" src="/audio/index/intro.wav"></audio>

        <button id="skipIntro" aria-label="Passer l'intro">[ Passer ]</button>

        <div aria-label="Instructions pour le joueur" class="stage" id="matrixInstructions">
          <div class="instrHeader">
            <div class="closeWrap">
              <div aria-label="Fermer les instructions" id="closeInstructions">✕</div>
            </div>
            <div class="instrTitle">Interagir avec le Champ de Code</div>
          </div>
          <div class="instrDivider"></div>
          <div class="instrLine">Clic gauche · Sonder</div>
          <div class="instrLine">Clic droit · Contourner</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ================= Mobile instruction bar (hidden on desktop) ================= -->
  <div id="mobileInstructions" aria-hidden="true">
    <span>Appuyer · Logiciel espion</span>
    <span class="mobileInstrDash">—</span>
    <span>Appui long · Réinitialiser</span>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script type="module" src="/js/index.js"></script>

</body>

</html>
